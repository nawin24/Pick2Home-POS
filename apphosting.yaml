runConfig:
  minInstances: 0

scripts:
  buildCommand: "prisma generate && next build" # ⬅️ Add this if needed

env:
  # Database
  - variable: DATABASE_URL
    value: "file:/app/prisma/dev.db"
    availability:
      - BUILD
      - RUNTIME

  # Firebase Client SDK
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: "AIzaSyB-SZlR8QdVsU8sKMuEK2gmv3Enqd1l-TU"
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: "pick2home-1.firebaseapp.com"
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: "pick2home-1"
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: "pick2home-1.firebasestorage.app"
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: "639071918684"
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: "1:639071918684:web:b81167bd8aeae3ad92a499"
    availability:
      - BUILD
      - RUNTIME

  # Firebase Admin SDK
  - variable: FIREBASE_PROJECT_ID
    value: "pick2home-1"
    availability:
      - BUILD
      - RUNTIME

  - variable: FIREBASE_STORAGE_BUCKET
    value: "pick2home-1.firebasestorage.app"
    availability:
      - BUILD
      - RUNTIME

  # Secrets
  - variable: JWT_SECRET
    secret: jwt-secret

  - variable: FIREBASE_SERVICE_ACCOUNT_JSON
    secret: firebase-service-account

